<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>zachvivier.com</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --fg: #e6e6e6;
    --dim: #7a7a7a;
    --accent: #9ad1ff;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    background: #000;
    color: var(--fg);
    font-family: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace;
    overflow: hidden;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.025) 0px,
      rgba(255,255,255,0.025) 1px,
      transparent 1px,
      transparent 3px
    );
    z-index: 2;
  }
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.6) 100%);
    z-index: 3;
  }
  main {
    position: relative;
    z-index: 1;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  #nav {
    font-size: 1rem;
    letter-spacing: 0.15em;
    color: var(--fg);
    text-shadow: 0 0 8px rgba(230,230,230,0.25);
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.03);
    padding: 0.55rem 0.9rem;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    align-items: center;
    gap: 0.9rem;
    transition: border-color 0.2s, background 0.2s, color 0.2s;
  }
  #nav:hover, #nav.open {
    color: var(--accent);
    border-color: rgba(154,209,255,0.45);
    background: rgba(154,209,255,0.05);
  }
  #nav .label { color: var(--dim); }
  #nav:hover .label, #nav.open .label { color: var(--accent); }
  #nav .links {
    display: flex;
    gap: 0.9rem;
    max-width: 0;
    overflow: hidden;
    white-space: nowrap;
    transition: max-width 0.7s ease;
  }
  #nav:hover .links, #nav.open .links { max-width: 30rem; }
  #nav .links a {
    color: var(--fg);
    text-decoration: none;
    border-bottom: 1px dotted rgba(255,255,255,0.25);
  }
  #nav .links a:hover {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .cursor {
    display: inline-block;
    width: 0.55ch;
    animation: blink 1.1s steps(2, start) infinite;
    user-select: none;
    -webkit-user-select: none;
  }
  @keyframes blink { to { visibility: hidden; } }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  main, footer {
    animation: fadeIn 0.9s ease-out both;
  }
  footer { animation: fadeIn 2.5s ease-out 0.9s both; }
  footer {
    position: fixed;
    bottom: 0.75rem;
    width: 100%;
    text-align: center;
    color: var(--dim);
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    z-index: 1;
  }
  footer a { color: var(--dim); text-decoration: none; border-bottom: 1px dotted var(--dim); }
  footer a:hover { color: var(--fg); border-bottom-color: var(--fg); }
</style>
</head>
<body>
<main>
  <div id="nav" role="navigation" tabindex="0" aria-label="site navigation">
    <span class="label">~</span><span class="cursor">█</span>
    <span class="links">
      <a href="/ip">whoami</a>
      <a href="/uses">uses</a>
    </span>
  </div>
</main>
<footer>zachvivier.com · <a href="https://github.com/zachvier/zachvier.github.io" target="_blank" rel="noopener">source</a> · <a href="/privacy">privacy</a></footer>
<script>
  const nav = document.getElementById('nav');
  nav.addEventListener('click', (e) => {
    if (e.target.tagName === 'A') return;
    nav.classList.toggle('open');
  });
  nav.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      nav.classList.toggle('open');
    } else if (e.key === 'Escape') {
      nav.classList.remove('open');
    }
  });
  document.addEventListener('click', (e) => {
    if (!nav.contains(e.target)) nav.classList.remove('open');
  });
</script>
</body>
</html>
