<!DOCTYPE html>

<style>
  :root {
    --bg: #000;
    --fg: #e6e6e6;
    --dim: #7a7a7a;
    --accent: #9ad1ff;
    --scanline: rgba(255,255,255,0.025);
    --vignette: rgba(0,0,0,0.6);
    --nav-border: rgba(255,255,255,0.15);
    --nav-bg: rgba(255,255,255,0.03);
    --nav-accent-border: rgba(154,209,255,0.45);
    --nav-accent-bg: rgba(154,209,255,0.05);
    --link-underline: rgba(255,255,255,0.25);
    --text-glow: rgba(230,230,230,0.25);
  }
  :root[data-theme="light"] {
    --bg: #2a2a2a;
    --fg: #e6e6e6;
    --dim: #8a8a8a;
    --accent: #9ad1ff;
    --scanline: rgba(255,255,255,0.02);
    --vignette: rgba(0,0,0,0.35);
    --nav-border: rgba(255,255,255,0.12);
    --nav-bg: rgba(255,255,255,0.04);
    --nav-accent-border: rgba(154,209,255,0.45);
    --nav-accent-bg: rgba(154,209,255,0.06);
    --link-underline: rgba(255,255,255,0.22);
    --text-glow: rgba(230,230,230,0.18);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace;
    overflow: hidden;
    transition: background 0.25s, color 0.25s;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      var(--scanline) 0px,
      var(--scanline) 1px,
      transparent 1px,
      transparent 3px
    );
    z-index: 2;
  }
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 55%, var(--vignette) 100%);
    z-index: 3;
  }
  main {
    position: relative;
    z-index: 1;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  #nav {
    font-size: 1rem;
    letter-spacing: 0.15em;
    color: var(--fg);
    text-shadow: 0 0 8px var(--text-glow);
    border: 1px solid var(--nav-border);
    background: var(--nav-bg);
    padding: 0.55rem 0.9rem;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    align-items: center;
    gap: 0.9rem;
    transition: border-color 0.2s, background 0.2s, color 0.2s;
  }
  #nav:hover, #nav.open {
    color: var(--accent);
    border-color: var(--nav-accent-border);
    background: var(--nav-accent-bg);
  }
  #nav .label { color: var(--dim); }
  #nav:hover .label, #nav.open .label { color: var(--accent); }
  #nav .links {
    display: flex;
    gap: 0.9rem;
    max-width: 0;
    overflow: hidden;
    white-space: nowrap;
    transition: max-width 0.7s ease;
  }
  #nav:hover .links, #nav.open .links { max-width: 30rem; }
  #nav.hint .links, #nav.hint:hover .links { max-width: 0; }
  #nav .links a {
    color: var(--fg);
    text-decoration: none;
    border-bottom: 1px dotted var(--link-underline);
  }
  #nav .links a:hover {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  #nav .hint {
    display: inline-block;
    max-width: 0;
    overflow: hidden;
    white-space: nowrap;
    color: var(--dim);
    font-style: italic;
    vertical-align: middle;
    transition: max-width 0.5s ease, color 0.2s;
  }
  #nav.hint > .hint { max-width: 18rem; color: var(--accent); }
  #nav.hint {
    color: var(--accent);
    border-color: var(--nav-accent-border);
    background: var(--nav-accent-bg);
  }
  #nav.hint .label { color: var(--accent); }
  @keyframes pixelMorph {
    0%   { filter: blur(3px) contrast(1.8) saturate(1.4); }
    100% { filter: blur(0) contrast(1) saturate(1); }
  }
  #nav.morphing { animation: pixelMorph 0.5s steps(6, end); }
  .cursor {
    display: inline-block;
    width: 0.55ch;
    animation: blink 1.1s steps(2, start) infinite;
    user-select: none;
    -webkit-user-select: none;
  }
  @keyframes blink { to { visibility: hidden; } }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  main, footer {
    animation: fadeIn 0.9s ease-out both;
  }
  footer { animation: fadeIn 2.5s ease-out 0.9s both; }
  footer {
    position: fixed;
    bottom: 0.75rem;
    width: 100%;
    text-align: center;
    color: var(--dim);
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    z-index: 1;
  }
  footer a { color: var(--dim); text-decoration: none; border-bottom: 1px dotted var(--dim); }
  footer a:hover { color: var(--fg); border-bottom-color: var(--fg); }
  #themeToggle {
    position: fixed;
    bottom: 0.55rem;
    right: 0.9rem;
    background: none;
    border: none;
    color: var(--fg);
    cursor: pointer;
    padding: 0.25rem;
    font-size: 0.85rem;
    line-height: 1;
    z-index: 5;
    transition: filter 0.2s;
    animation: fadeIn 2.5s ease-out 0.9s both;
  }
  #themeToggle:hover { filter: drop-shadow(0 0 4px var(--fg)) drop-shadow(0 0 8px var(--fg)); }
  #linkedin {
    position: fixed;
    bottom: 0.55rem;
    left: 0.9rem;
    color: var(--dim);
    opacity: 0;
    transition: opacity 0.3s, color 0.2s, filter 0.2s;
    z-index: 5;
    line-height: 1;
    text-decoration: none;
  }
  #linkedin:hover {
    opacity: 1;
    color: var(--fg);
    filter: drop-shadow(0 0 4px var(--fg)) drop-shadow(0 0 8px var(--fg));
  }
  #linkedin svg {
    display: block;
    width: 0.85rem;
    height: 0.85rem;
  }
  #themeToggle .icon {
    display: block;
    width: 1em;
    height: 1em;
    background-color: currentColor;
    -webkit-mask: url(/moon.svg) no-repeat center / contain;
    mask: url(/moon.svg) no-repeat center / contain;
  }
  :root[data-theme="light"] #themeToggle .icon {
    -webkit-mask-image: url(/earth.svg);
    mask-image: url(/earth.svg);
  }
</style>
</head>
<body>
<main>
  <div id="nav" role="navigation" tabindex="0" aria-label="site navigation">
    <span class="label">~</span><span class="cursor">█</span>
    <span class="hint" aria-hidden="true">Hover to open directory</span>
    <span class="links">
      <a href="/ip">whoami</a>
      <a href="/status">status</a>
    </span>
  </div>
</main>
<footer>zachvivier.com · <a href="https://github.com/zachvier/zachvier.github.io" target="_blank" rel="noopener">source</a> · <a href="/privacy">privacy</a></footer>
<a id="linkedin" href="https://www.linkedin.com/in/zach-vivier/" target="_blank" rel="noopener" aria-label="LinkedIn profile"><svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M6.5 8C7.32843 8 8 7.32843 8 6.5C8 5.67157 7.32843 5 6.5 5C5.67157 5 5 5.67157 5 6.5C5 7.32843 5.67157 8 6.5 8Z"/><path d="M5 10C5 9.44772 5.44772 9 6 9H7C7.55228 9 8 9.44771 8 10V18C8 18.5523 7.55228 19 7 19H6C5.44772 19 5 18.5523 5 18V10Z"/><path d="M11 19H12C12.5523 19 13 18.5523 13 18V13.5C13 12 16 11 16 13V18.0004C16 18.5527 16.4477 19 17 19H18C18.5523 19 19 18.5523 19 18V12C19 10 17.5 9 15.5 9C13.5 9 13 10.5 13 10.5V10C13 9.44771 12.5523 9 12 9H11C10.4477 9 10 9.44772 10 10V18C10 18.5523 10.4477 19 11 19Z"/><path fill-rule="evenodd" clip-rule="evenodd" d="M20 1C21.6569 1 23 2.34315 23 4V20C23 21.6569 21.6569 23 20 23H4C2.34315 23 1 21.6569 1 20V4C1 2.34315 2.34315 1 4 1H20ZM20 3C20.5523 3 21 3.44772 21 4V20C21 20.5523 20.5523 21 20 21H4C3.44772 21 3 20.5523 3 20V4C3 3.44772 3.44772 3 4 3H20Z"/></svg></a>
<button id="themeToggle" type="button" aria-label="Toggle color scheme" title="Toggle color scheme"><span class="icon" aria-hidden="true"></span></button>
<script>
  (() => {
    const saved = localStorage.getItem('theme');
    const prefersLight = matchMedia('(prefers-color-scheme: light)').matches;
    const initial = saved || (prefersLight ? 'light' : 'dark');
    if (initial === 'light') document.documentElement.setAttribute('data-theme', 'light');
    document.getElementById('themeToggle').addEventListener('click', () => {
      const isLight = document.documentElement.getAttribute('data-theme') === 'light';
      if (isLight) {
        document.documentElement.removeAttribute('data-theme');
        localStorage.setItem('theme', 'dark');
      } else {
        document.documentElement.setAttribute('data-theme', 'light');
        localStorage.setItem('theme', 'light');
      }
    });
  })();

  const nav = document.getElementById('nav');
  nav.addEventListener('click', (e) => {
    if (e.target.tagName === 'A') return;
    nav.classList.toggle('open');
  });
  nav.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      nav.classList.toggle('open');
    } else if (e.key === 'Escape') {
      nav.classList.remove('open');
    }
  });
  document.addEventListener('click', (e) => {
    if (!nav.contains(e.target)) nav.classList.remove('open');
  });

  let hintTimer = null;
  const clearHint = () => {
    clearTimeout(hintTimer);
    hintTimer = null;
    nav.classList.remove('hint');
  };
  document.addEventListener('keydown', (e) => {
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    if (e.key.length !== 1 && e.key !== 'Spacebar') return;
    if (nav.classList.contains('open') || nav.classList.contains('hint')) return;
    if (nav.matches(':hover')) return;
    nav.classList.add('hint');
    hintTimer = setTimeout(clearHint, 2800);
  });
  nav.addEventListener('mouseenter', () => {
    if (!nav.classList.contains('hint')) return;
    clearHint();
    nav.classList.add('morphing');
    setTimeout(() => nav.classList.remove('morphing'), 500);
  });
</script>
</body>
</html>
