<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>whoami · zachvivier.com</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --fg: #e6e6e6;
    --dim: #7a7a7a;
    --accent: #9ad1ff;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    background: #000;
    color: var(--fg);
    font-family: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace;
    overflow: hidden;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.025) 0px,
      rgba(255,255,255,0.025) 1px,
      transparent 1px,
      transparent 3px
    );
    z-index: 2;
  }
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.6) 100%);
    z-index: 3;
  }
  main {
    position: relative;
    z-index: 1;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  #ip {
    font-size: clamp(1.6rem, 6vw, 3.25rem);
    letter-spacing: 0.05em;
    cursor: pointer;
    white-space: nowrap;
    text-shadow: 0 0 8px rgba(230,230,230,0.25);
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  #ip:hover { color: var(--accent); }
  .cursor {
    display: inline-block;
    width: 0.55ch;
    margin-left: 0.1ch;
    animation: blink 1.1s steps(2, start) infinite;
  }
  @keyframes blink { to { visibility: hidden; } }
  #hint {
    margin-top: 1.25rem;
    color: var(--dim);
    font-size: 0.8rem;
    letter-spacing: 0.05em;
    opacity: 0;
    transition: opacity 0.4s;
    text-align: center;
  }
  #hint.show { opacity: 1; }
  #hint kbd {
    border: 1px solid var(--dim);
    border-radius: 3px;
    padding: 0 0.35em;
    font: inherit;
    font-size: 0.75rem;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }
  #hint kbd:hover { color: var(--fg); border-color: var(--fg); }
  #toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(255,255,255,0.08);
    color: var(--fg);
    border: 1px solid rgba(255,255,255,0.15);
    padding: 0.5rem 1rem;
    border-radius: 4px;
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s, transform 0.25s;
    z-index: 5;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #details {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.94);
    display: none;
    align-items: flex-start;
    justify-content: center;
    padding: 3rem 1.5rem;
    overflow-y: auto;
    z-index: 4;
  }
  #details.show { display: flex; }
  #details .panel {
    width: 100%;
    max-width: 640px;
    font-size: 0.85rem;
    line-height: 1.7;
  }
  #details h2 {
    font-size: 0.75rem;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin: 1.5rem 0 0.5rem;
    font-weight: normal;
  }
  #details h2:first-child { margin-top: 0; }
  #details .row {
    display: grid;
    grid-template-columns: 10rem 1fr;
    gap: 1rem;
    padding: 0.15rem 0;
    border-bottom: 1px dotted rgba(255,255,255,0.06);
  }
  #details .k { color: var(--dim); }
  #details .v { word-break: break-word; }
  #details .close {
    position: fixed;
    top: 1rem;
    right: 1.25rem;
    color: var(--dim);
    cursor: pointer;
    font-size: 1rem;
  }
  #details .close:hover { color: var(--fg); }
  footer {
    position: fixed;
    bottom: 0.75rem;
    width: 100%;
    text-align: center;
    color: var(--dim);
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    z-index: 1;
  }
  footer a { color: var(--dim); text-decoration: none; border-bottom: 1px dotted var(--dim); }
  footer a:hover { color: var(--fg); border-bottom-color: var(--fg); }
</style>
</head>
<body>
<main>
  <div id="ip" title="click to copy"><span id="ipval"></span><span class="cursor">█</span></div>
  <div id="hint">tap ip to copy · tap <kbd id="detailsBtn">?</kbd> for details · <a href="/" style="color:var(--dim);text-decoration:none;border-bottom:1px dotted var(--dim);">home</a></div>
</main>
<div id="toast">copied</div>
<div id="details" role="dialog" aria-hidden="true">
  <span class="close" id="close">[esc]</span>
  <div class="panel" id="panel"></div>
</div>
<footer>zachvivier.com · <a href="https://github.com/zachvier/zachvier.github.io" target="_blank" rel="noopener">source</a></footer>
<script>
  const ipEl = document.getElementById('ipval');
  const hintEl = document.getElementById('hint');
  const toastEl = document.getElementById('toast');
  const detailsEl = document.getElementById('details');
  const panelEl = document.getElementById('panel');
  const closeEl = document.getElementById('close');

  let data = {};

  function typewrite(el, text, speed = 55) {
    el.textContent = '';
    let i = 0;
    return new Promise(resolve => {
      const tick = () => {
        if (i < text.length) {
          el.textContent += text[i++];
          setTimeout(tick, speed);
        } else {
          resolve();
        }
      };
      tick();
    });
  }

  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => toastEl.classList.remove('show'), 1400);
  }

  async function copyIp() {
    if (!data.ip) return;
    try {
      await navigator.clipboard.writeText(data.ip);
      showToast('copied ' + data.ip);
    } catch {
      showToast('copy failed');
    }
  }

  function row(k, v) {
    if (v === undefined || v === null || v === '') return '';
    return `<div class="row"><div class="k">${k}</div><div class="v">${String(v).replace(/</g,'&lt;')}</div></div>`;
  }

  function renderDetails() {
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    const now = new Date();
    const localTime = now.toLocaleString(undefined, { hour12: false });
    const utcTime = now.toISOString().replace('T', ' ').replace(/\..+/, ' UTC');
    const vp = `${window.innerWidth} × ${window.innerHeight}`;
    const screen = `${window.screen.width} × ${window.screen.height} @ ${window.devicePixelRatio}x`;

    panelEl.innerHTML = `
      <h2>network</h2>
      ${row('ip', data.ip)}
      ${row('reverse dns', data.connection?.domain)}
      ${row('isp', data.connection?.isp)}
      ${row('org', data.connection?.org)}
      ${row('asn', data.connection?.asn ? 'AS' + data.connection.asn : null)}
      ${row('type', data.type)}

      <h2>location</h2>
      ${row('city', data.city)}
      ${row('region', data.region)}
      ${row('country', data.country && data.country_code ? `${data.country} (${data.country_code})` : data.country)}
      ${row('postal', data.postal)}
      ${row('coords', data.latitude && data.longitude ? `${data.latitude}, ${data.longitude}` : null)}

      <h2>time</h2>
      ${row('timezone', tz)}
      ${row('local', localTime)}
      ${row('utc', utcTime)}

      <h2>client</h2>
      ${row('user agent', navigator.userAgent)}
      ${row('language', navigator.language)}
      ${row('platform', navigator.platform)}
      ${row('viewport', vp)}
      ${row('screen', screen)}
      ${row('color scheme', matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')}
    `;
  }

  function openDetails() {
    renderDetails();
    detailsEl.classList.add('show');
    detailsEl.setAttribute('aria-hidden', 'false');
  }
  function closeDetails() {
    detailsEl.classList.remove('show');
    detailsEl.setAttribute('aria-hidden', 'true');
  }

  document.getElementById('ip').addEventListener('click', copyIp);
  document.getElementById('detailsBtn').addEventListener('click', openDetails);
  closeEl.addEventListener('click', closeDetails);
  detailsEl.addEventListener('click', (e) => { if (e.target === detailsEl) closeDetails(); });

  document.addEventListener('keydown', (e) => {
    if (e.key === '?' || (e.key === '/' && e.shiftKey)) {
      e.preventDefault();
      detailsEl.classList.contains('show') ? closeDetails() : openDetails();
    } else if (e.key === 'Escape') {
      closeDetails();
    } else if (e.key.toLowerCase() === 'c' && !detailsEl.classList.contains('show')) {
      copyIp();
    }
  });

  fetch('https://api.ipify.org?format=json')
    .then(r => r.json())
    .then(async ({ ip }) => {
      data.ip = ip;
      await typewrite(ipEl, ip);
      hintEl.classList.add('show');
      try {
        const r = await fetch('https://ipwho.is/' + encodeURIComponent(ip));
        const d = await r.json();
        if (d && d.success !== false) data = { ...d, ip };
      } catch { /* enrichment optional */ }
    })
    .catch(() => {
      ipEl.textContent = 'unable to detect ip';
    });
</script>
</body>
</html>
