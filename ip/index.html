<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>whoami · zachvivier.com</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --fg: #e6e6e6;
    --dim: #7a7a7a;
    --accent: #9ad1ff;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    background: #000;
    color: var(--fg);
    font-family: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace;
    overflow: hidden;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.025) 0px,
      rgba(255,255,255,0.025) 1px,
      transparent 1px,
      transparent 3px
    );
    z-index: 2;
  }
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.6) 100%);
    z-index: 3;
  }
  main {
    position: relative;
    z-index: 1;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  #ip {
    font-size: clamp(1.6rem, 6vw, 3.25rem);
    letter-spacing: 0.05em;
    cursor: pointer;
    white-space: nowrap;
    text-shadow: 0 0 8px rgba(230,230,230,0.25);
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  #ip:hover { color: var(--accent); }
  .cursor {
    display: inline-block;
    width: 0.55ch;
    margin-left: 0.1ch;
    animation: blink 1.1s steps(2, start) infinite;
  }
  @keyframes blink { to { visibility: hidden; } }
  #hint {
    margin-top: 1.25rem;
    color: var(--dim);
    font-size: 0.8rem;
    letter-spacing: 0.05em;
    opacity: 0;
    transition: opacity 0.4s;
    text-align: center;
  }
  #hint.show { opacity: 1; }
  #hint kbd {
    border: 1px solid var(--dim);
    border-radius: 3px;
    padding: 0 0.35em;
    font: inherit;
    font-size: 0.75rem;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }
  #hint kbd:hover { color: var(--fg); border-color: var(--fg); }
  #toast {
    position: fixed;
    top: 1.25rem;
    bottom: auto;
    left: 50%;
    transform: translateX(-50%) translateY(-12px);
    background: var(--accent);
    color: #000;
    border: 1px solid var(--accent);
    padding: 0.55rem 1.1rem;
    border-radius: 4px;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    box-shadow: 0 0 20px rgba(154,209,255,0.45), 0 4px 16px rgba(0,0,0,0.6);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 10;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.bottom { top: auto; bottom: 1.25rem; transform: translateX(-50%) translateY(12px); }
  #toast.bottom.show { transform: translateX(-50%) translateY(0); }
  #details {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.94);
    display: none;
    align-items: flex-start;
    justify-content: center;
    padding: 3rem 1.5rem;
    overflow-y: auto;
    z-index: 4;
  }
  #details.show { display: flex; }
  #details .panel {
    width: 100%;
    max-width: 640px;
    font-size: 0.85rem;
    line-height: 1.7;
  }
  #details h2 {
    font-size: 0.75rem;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin: 1.5rem 0 0.5rem;
    font-weight: normal;
  }
  #details h2:first-child { margin-top: 0; }
  #details .row {
    padding: 0.15rem 0;
    border-bottom: 1px dotted rgba(255,255,255,0.06);
    clip-path: inset(0 100% 0 0);
  }
  #details .hit {
    display: grid;
    grid-template-columns: 10rem auto;
    gap: 1rem;
    cursor: pointer;
    transition: opacity 0.2s, color 0.2s;
    width: fit-content;
    max-width: 100%;
  }
  #details.show .row {
    animation: revealRow 0.5s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
  }
  @keyframes revealRow {
    to { clip-path: inset(0 0 0 0); }
  }
  #details h2 {
    clip-path: inset(0 100% 0 0);
  }
  #details.show h2 {
    animation: revealRow 0.4s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
  }
  #panel.hovering .hit:not(:hover),
  #panel.hovering h2 { opacity: 0.3; }
  #details .hit:hover { color: var(--accent); }
  #details .hit:hover .k { color: var(--accent); }
  #details .k { color: var(--dim); transition: color 0.2s; }
  #details .v { word-break: break-word; }
  #desc {
    position: fixed;
    left: 50%;
    bottom: 1.5rem;
    top: auto;
    transform: translateX(-50%);
    max-width: 640px;
    width: calc(100% - 3rem);
    background: rgba(20,20,20,0.72);
    backdrop-filter: blur(16px) saturate(140%);
    -webkit-backdrop-filter: blur(16px) saturate(140%);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 4px;
    padding: 0.75rem 1rem;
    font-size: 0.8rem;
    line-height: 1.5;
    color: var(--fg);
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
    z-index: 5;
  }
  #desc.show { opacity: 1; }
  #desc.top { top: 1.5rem; bottom: auto; }
  #desc .label {
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    font-size: 0.65rem;
    display: block;
    margin-bottom: 0.25rem;
  }
  #details .close {
    position: fixed;
    top: 0.5rem;
    right: 0.75rem;
    color: var(--dim);
    cursor: pointer;
    font-size: 1rem;
    padding: 0.5rem;
    z-index: 6;
  }
  #details .close:hover { color: var(--fg); }
  footer {
    position: fixed;
    bottom: 0.75rem;
    width: 100%;
    text-align: center;
    color: var(--dim);
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    z-index: 1;
  }
  footer a { color: var(--dim); text-decoration: none; border-bottom: 1px dotted var(--dim); }
  footer a:hover { color: var(--fg); border-bottom-color: var(--fg); }
</style>
</head>
<body>
<main>
  <div id="ip" title="click to copy"><span id="ipval"></span><span class="cursor">█</span></div>
  <div id="hint">tap ip to copy · tap <kbd id="detailsBtn">?</kbd> for details · <a href="/" style="color:var(--dim);text-decoration:none;border-bottom:1px dotted var(--dim);">home</a></div>
</main>
<div id="toast">copied</div>
<div id="details" role="dialog" aria-hidden="true">
  <span class="close" id="close">[esc]</span>
  <div class="panel" id="panel"></div>
  <div id="desc"><span class="label"></span><span class="text"></span></div>
</div>
<footer>zachvivier.com · <a href="https://github.com/zachvier/zachvier.github.io" target="_blank" rel="noopener">source</a> · <a href="/privacy">privacy</a></footer>
<script>
  const ipEl = document.getElementById('ipval');
  const hintEl = document.getElementById('hint');
  const toastEl = document.getElementById('toast');
  const detailsEl = document.getElementById('details');
  const panelEl = document.getElementById('panel');
  const closeEl = document.getElementById('close');

  let data = {};

  function typewrite(el, text, speed = 55) {
    el.textContent = '';
    let i = 0;
    return new Promise(resolve => {
      const tick = () => {
        if (i < text.length) {
          el.textContent += text[i++];
          setTimeout(tick, speed);
        } else {
          resolve();
        }
      };
      tick();
    });
  }

  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => toastEl.classList.remove('show'), 1400);
  }

  async function copyText(text) {
    try {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        return true;
      }
    } catch {}
    try {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      const ok = document.execCommand('copy');
      document.body.removeChild(ta);
      return ok;
    } catch {
      return false;
    }
  }

  async function copyIp() {
    if (!data.ip) return;
    const ok = await copyText(data.ip);
    showToast(ok ? 'copied ' + data.ip : 'copy failed');
  }

  const descriptions = {
    'ipv4': 'Your public IPv4 address — the 32-bit identifier your network presents to the internet over the legacy protocol most sites still default to.',
    'ipv6': 'Your public IPv6 address — the 128-bit successor to IPv4. Shown only if your connection supports it.',
    'isp': 'The Internet Service Provider routing your traffic — the company you pay for connectivity.',
    'country': 'Country associated with this IP block, per the geolocation provider.',
    'region': 'A rough regional hint from IP geolocation. Intentionally coarse — city-level precision is both unreliable and more than this page needs to share.',
    'timezone': 'Your browser\'s reported IANA timezone. Set by your OS, not the IP.',
    'local': 'Current time as your device sees it, in your local timezone.',
    'utc': 'Current time in UTC — the timezone-neutral reference used by servers and logs.',
    'user agent': 'The identifier your browser sends with every request. Declares browser, engine, OS, and version.',
    'language': 'Your browser\'s preferred language, sent in the Accept-Language header.',
    'platform': 'The OS platform your browser reports. Apple freezes this as "MacIntel" on all Macs (including Apple Silicon) for web compatibility — Chromium browsers expose the real architecture via userAgentData.',
    'viewport': 'Size of the visible browser window in CSS pixels — what your page actually has to work with.',
    'screen': 'Your physical screen\'s resolution and pixel density. The multiplier reflects Retina/HiDPI scaling.',
    'color scheme': 'Whether your OS is currently in light or dark mode. Sites can respect this via CSS prefers-color-scheme.'
  };

  function row(k, v) {
    if (v === undefined || v === null || v === '') return '';
    return `<div class="row"><div class="hit" data-key="${k}"><div class="k">${k}</div><div class="v">${String(v).replace(/</g,'&lt;')}</div></div></div>`;
  }

  function renderDetails() {
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    const now = new Date();
    const localTime = now.toLocaleString(undefined, { hour12: false });
    const utcTime = now.toISOString().replace('T', ' ').replace(/\..+/, ' UTC');
    const vp = `${window.innerWidth} × ${window.innerHeight}`;
    const screen = `${window.screen.width} × ${window.screen.height} @ ${window.devicePixelRatio}x`;

    panelEl.innerHTML = `
      <h2>network</h2>
      ${row('ipv4', data.ipv4)}
      ${row('ipv6', data.ipv6)}
      ${row('isp', data.connection?.isp)}

      <h2>location</h2>
      ${row('country', data.country && data.country_code ? `${data.country} (${data.country_code})` : data.country)}
      ${row('region', data.roughRegion)}

      <h2>time</h2>
      ${row('timezone', tz)}
      ${row('local', localTime)}
      ${row('utc', utcTime)}

      <h2>client</h2>
      ${row('user agent', navigator.userAgent)}
      ${row('language', navigator.language)}
      ${row('platform', navigator.platform)}
      ${row('viewport', vp)}
      ${row('screen', screen)}
      ${row('color scheme', matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')}
    `;

    const all = panelEl.querySelectorAll('.row, h2');
    all.forEach((el, i) => { el.style.animationDelay = (i * 40) + 'ms'; });

    if (navigator.userAgentData?.getHighEntropyValues) {
      navigator.userAgentData.getHighEntropyValues(['platform', 'platformVersion', 'architecture', 'bitness']).then(ua => {
        const parts = [];
        if (ua.platform) parts.push(ua.platform);
        if (ua.architecture) parts.push(ua.architecture + (ua.bitness ? ua.bitness : ''));
        if (!parts.length) return;
        const platRow = panelEl.querySelector('.hit[data-key="platform"] .v');
        if (platRow) platRow.textContent = parts.join(' ');
      }).catch(() => {});
    }

    const descEl = document.getElementById('desc');
    const descLabel = descEl.querySelector('.label');
    const descText = descEl.querySelector('.text');
    let hideTimer;
    const clearHover = () => {
      panelEl.classList.remove('hovering');
      descEl.classList.remove('show');
    };
    closeEl.onmouseenter = () => {
      clearTimeout(hideTimer);
      panelEl.classList.add('hovering');
      descEl.classList.remove('show');
    };
    closeEl.onmouseleave = () => {
      panelEl.classList.remove('hovering');
    };
    panelEl.querySelectorAll('.hit').forEach(r => {
      r.addEventListener('mouseenter', () => {
        clearTimeout(hideTimer);
        const k = r.dataset.key;
        const d = descriptions[k];
        if (!d) return;
        panelEl.classList.add('hovering');
        descLabel.textContent = k;
        descText.textContent = d;
        const rect = r.getBoundingClientRect();
        const rowBelowMidpoint = rect.top + rect.height / 2 > window.innerHeight / 2;
        descEl.classList.toggle('top', rowBelowMidpoint);
        toastEl.classList.toggle('bottom', rowBelowMidpoint);
        descEl.classList.add('show');
      });
      r.addEventListener('mouseleave', () => {
        clearTimeout(hideTimer);
        hideTimer = setTimeout(clearHover, 40);
      });
      r.addEventListener('click', async () => {
        const val = r.querySelector('.v')?.textContent?.trim();
        if (!val) return;
        const ok = await copyText(val);
        showToast(ok ? 'copied ' + r.dataset.key : 'copy failed');
      });
    });
  }

  function updateLiveRows() {
    const vpRow = panelEl.querySelector('.hit[data-key="viewport"] .v');
    if (vpRow) vpRow.textContent = `${window.innerWidth} × ${window.innerHeight}`;
    const scRow = panelEl.querySelector('.hit[data-key="screen"] .v');
    if (scRow) scRow.textContent = `${window.screen.width} × ${window.screen.height} @ ${window.devicePixelRatio}x`;
  }
  window.addEventListener('resize', () => {
    if (detailsEl.classList.contains('show')) updateLiveRows();
  });

  function openDetails() {
    renderDetails();
    detailsEl.classList.add('show');
    detailsEl.setAttribute('aria-hidden', 'false');
  }
  function closeDetails() {
    detailsEl.classList.remove('show');
    detailsEl.setAttribute('aria-hidden', 'true');
  }

  document.getElementById('ip').addEventListener('click', copyIp);
  document.getElementById('detailsBtn').addEventListener('click', openDetails);
  closeEl.addEventListener('click', closeDetails);
  detailsEl.addEventListener('click', (e) => { if (e.target === detailsEl) closeDetails(); });

  document.addEventListener('keydown', (e) => {
    if (e.key === '?' || (e.key === '/' && e.shiftKey)) {
      e.preventDefault();
      detailsEl.classList.contains('show') ? closeDetails() : openDetails();
    } else if (e.key === 'Escape') {
      closeDetails();
    } else if (e.key.toLowerCase() === 'c' && !detailsEl.classList.contains('show')) {
      copyIp();
    }
  });

  const US_REGIONS = {
    northeast: ['CT','ME','MA','NH','NJ','NY','PA','RI','VT'],
    midwest:   ['IL','IN','IA','KS','MI','MN','MO','NE','ND','OH','SD','WI'],
    south:     ['AL','AR','DE','DC','FL','GA','KY','LA','MD','MS','NC','OK','SC','TN','TX','VA','WV'],
    west:      ['AK','AZ','CA','CO','HI','ID','MT','NV','NM','OR','UT','WA','WY'],
  };

  function roughRegionFor(countryCode, regionCode) {
    if (countryCode === 'US' && regionCode) {
      for (const [name, states] of Object.entries(US_REGIONS)) {
        if (states.includes(regionCode)) {
          return name.charAt(0).toUpperCase() + name.slice(1) + 'ern US';
        }
      }
    }
    return null;
  }

  function fetchText(url) {
    return fetch(url).then(r => r.ok ? r.text() : Promise.reject(r.status));
  }

  (async () => {
    const [v4Res, v6Res] = await Promise.allSettled([
      fetchText('https://api4.ipify.org?format=text'),
      fetchText('https://api6.ipify.org?format=text'),
    ]);
    const ipv4 = v4Res.status === 'fulfilled' ? v4Res.value.trim() : null;
    const ipv6 = v6Res.status === 'fulfilled' ? v6Res.value.trim() : null;

    if (!ipv4 && !ipv6) {
      ipEl.textContent = 'unable to detect ip';
      return;
    }

    data.ipv4 = ipv4;
    data.ipv6 = ipv6;
    data.ip = ipv4 || ipv6;

    await typewrite(ipEl, data.ip);
    hintEl.classList.add('show');

    const enrichTarget = ipv4 || ipv6;
    try {
      const r = await fetch('https://ipapi.co/' + encodeURIComponent(enrichTarget) + '/json/');
      const d = await r.json();
      if (d && !d.error) {
        data.country = d.country_name;
        data.country_code = d.country_code;
        data.roughRegion = roughRegionFor(d.country_code, d.region_code);
        data.connection = { isp: d.org };
      }
    } catch { /* enrichment optional */ }
  })();
</script>
</body>
</html>
